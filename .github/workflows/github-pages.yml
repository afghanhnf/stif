name: Deploy static preview to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_NAME: STIF Capital
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: http://127.0.0.1:8000
      APP_LOCALE: en
      APP_FALLBACK_LOCALE: en
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure static base path
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" != "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "STATIC_BASE_PATH=/$REPO_NAME" >> "$GITHUB_ENV"
            echo "ASSET_URL=/$REPO_NAME" >> "$GITHUB_ENV"
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Create environment file
        run: cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare Laravel
        run: |
          php artisan key:generate --force
          touch database/database.sqlite
          php artisan migrate --force
          php artisan db:seed --force

      - name: Build frontend assets
        run: npm run build

      - name: Export public pages
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 > /tmp/stif-server.log 2>&1 &
          sleep 5
          php scripts/export-static.php

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-static

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
